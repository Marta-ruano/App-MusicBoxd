{% extends "layout.html" %}

{% block h1 %}Error 500{% endblock %}
{% block p %}Ha ocurrido un fallo en el servidor{% endblock %}

{% block content %}
<main>
    <div class="container">
        <section class="panel">
            <h2 style="margin-top:0;">500 - Internal Server Error</h2>
            <p class="lead">Sorry, something went wrong on the server. Please try again later.</p>

            <div class="form-actions" style="margin-top:14px;">
                <a class="btn btn-primary" href="/">Ir al inicio</a>
                <a class="btn" href="/music/">Volver a música</a>
            </div>
        </section>
    </div>
</main>
{% endblock %}
